name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '4.0.5'
    steps:
      - uses: extractions/setup-just@v4
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          # Installs gems into <repo>/vendor/bundle and caches them between
          # runs. Safe now that AllCops/Exclude keeps RuboCop out of vendor/.
          bundler-cache: true
      - name: Run Specs
        run: bundle exec rspec --format documentation
      - name: Run RuboCop
        run: bundle exec rubocop
      - name: Validate Examples
        run: just examples
