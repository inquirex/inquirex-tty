inherit_from:
  - .relaxed_rubocop.yml

# Without this, the AllCops/Exclude list below REPLACES RuboCop's defaults
# (vendor/**/*, node_modules/**/*, tmp/**/*, .git/**/*) instead of adding to
# them. That is not academic: with `bundler-cache: true` the CI runner installs
# gems into <repo>/vendor/bundle, RuboCop then walks into the vendored gems,
# loads a gem's own .rubocop.yml, and dies with
# "cannot load such file -- rubocop-rake" (exit 2) before linting anything.
inherit_mode:
  merge:
    - Exclude

AllCops:
  SuggestExtensions: false
  TargetRubyVersion: 4.0
  NewCops: enable
  Include:
    - "**/*.rb"
  Exclude:
    - "bin/**/*"
    - "vendor/**/*"

Layout/HashAlignment:
  EnforcedHashRocketStyle: table
  EnforcedColonStyle: table

Layout/MultilineMethodArgumentLineBreaks:
  Enabled: true

Layout/FirstArgumentIndentation:
  EnforcedStyle: consistent

Layout/ParameterAlignment:
  EnforcedStyle: with_fixed_indentation

Layout/ExtraSpacing:
  AllowForAlignment: true

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

plugins:
  - rubocop-rspec

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 50

Metrics/ClassLength:
  Max: 100

# --- Alignment Rules (your main obsession) ---

Layout/ArgumentAlignment:
  EnforcedStyle: with_fixed_indentation

# --- Hash formatting (this is where the magic mostly happens) ---

Layout/SpaceAroundOperators:
  Enabled: true

Layout/SpaceBeforeFirstArg:
  Enabled: true

# --- RSpec configuration ---

RSpec:
  Enabled: true

# RSpec/Its:
#   Enabled: true

# Allow rspec-its style:
RSpec/DescribeClass:
  Enabled: false

# This prevents RuboCop from whining about one-liners
RSpec/ExampleLength:
  Max: 20

# --- Relaxed rules (because life is short) ---

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Style/OptionalBooleanParameter:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

Style/SingleArgumentDig:
  Enabled: false

# CLI messages must survive RUBYOPT=W0: Kernel#warn is a documented no-op
# under -W0, silently swallowing every error message. $stderr.puts is not.
Style/StderrPuts:
  Enabled: false

# The uname member of CompletionMetadata is deliberately an OpenStruct.
Style/OpenStructUse:
  Exclude:
    - "lib/inquirex/tty/commands/run.rb"
